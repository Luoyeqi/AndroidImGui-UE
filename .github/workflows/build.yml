name: Android NDK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
      fail-fast: false  # 不因一个失败而取消其他任务

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r28
        add-to-path: true

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Display NDK Info
      run: |
        echo "=== NDK Information ==="
        echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
        echo "Environment NDK: ${{ env.ANDROID_NDK }}"
        
        # 检查 toolchain 文件
        if [ -f "$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" ]; then
          echo "✓ Toolchain file found at ANDROID_NDK_HOME"
        fi
        
        if [ -f "${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake" ]; then
          echo "✓ Toolchain file found at ANDROID_NDK env var"
        fi
        
        echo "=== CMake version ==="
        cmake --version
        
        echo "=== Ninja version ==="
        ninja --version

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        
        cmake -G "Ninja" \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
          -DCMAKE_MAKE_PROGRAM=$(which ninja) \
          ..

    - name: Build Library
      run: |
        cd build
        ninja -j8

    - name: Verify Build Output
      run: |
        BUILD_OUTPUT="build/libs/${{ matrix.abi }}/libProject.so"
        
        if [ -f "$BUILD_OUTPUT" ]; then
          echo "✓ Build successful!"
          ls -lh "$BUILD_OUTPUT"
          file "$BUILD_OUTPUT"
        else
          echo "✗ Build failed! libProject.so not found"
          echo "Contents of build directory:"
          find build -type f -name "*.so" 2>/dev/null || echo "No .so files found"
          exit 1
        fi

    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: libProject-${{ matrix.abi }}
        path: build/libs/${{ matrix.abi }}/libProject.so
        retention-days: 30

    - name: Upload Build Logs (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.abi }}
        path: build/
        retention-days: 7

  # 汇总报告
  summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          echo "Build workflow completed!"
          echo "Status: ${{ needs.build.result }}"
