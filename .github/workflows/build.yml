name: Android NDK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r28
        add-to-path: true

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Verify NDK Installation
      run: |
        echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
        echo "NDK_PATH: ${{ env.ANDROID_NDK }}"
        ls -la $ANDROID_NDK_HOME/build/cmake/ || echo "NDK cmake not found at ANDROID_NDK_HOME"
        
        # 尝试找到 NDK 路径
        find ~ -name "android.toolchain.cmake" 2>/dev/null | head -5

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        
        # 使用正确的 NDK 路径
        cmake -G "Ninja" \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
          -DCMAKE_MAKE_PROGRAM=$(which ninja) \
          ..

    - name: Build
      run: |
        cd build
        ninja -j8

    - name: Check build output
      run: |
        if [ -f "build/libs/${{ matrix.abi }}/libProject.so" ]; then
          ls -lh build/libs/${{ matrix.abi }}/libProject.so
          file build/libs/${{ matrix.abi }}/libProject.so
        else
          echo "Error: libProject.so not found!"
          find build -name "*.so" 2>/dev/null
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: libProject-${{ matrix.abi }}
        path: build/libs/${{ matrix.abi }}/libProject.so
        retention-days: 30
