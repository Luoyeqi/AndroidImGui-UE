name: Android NDK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 设置 Java 环境
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    # 3. 安装 Android NDK
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r28

    # 4. 安装 CMake 和 Ninja
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    # 5. 打印工具版本（调试用）
    - name: Print tool versions
      run: |
        cmake --version
        ninja --version
        echo "NDK_PATH: ${{ env.ANDROID_NDK }}"

    # 6. 配置 CMake
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake -G "Ninja" \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
          ..

    # 7. 执行编译
    - name: Build
      run: |
        cd build
        ninja -j8

    # 8. 检查编译产物
    - name: Check build output
      run: |
        ls -la build/libs/${{ matrix.abi }}/
        file build/libs/${{ matrix.abi }}/libProject.so

    # 9. 上传到 Release（只在创建 Tag 时）
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/libs/${{ matrix.abi }}/libProject.so
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 10. 上传到 Artifacts（每次都保存）
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: libProject-${{ matrix.abi }}
        path: build/libs/${{ matrix.abi }}/libProject.so
        retention-days: 30
